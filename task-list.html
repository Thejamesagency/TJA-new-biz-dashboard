/* ===== STATE ===== */
let taskTypeOptions = JSON.parse(localStorage.getItem("sr_taskTypeOptions")) || [...defaultTaskTypes];
let statusOptions = JSON.parse(localStorage.getItem("sr_statusOptions")) || [...defaultStatuses];
let priorityOptions = JSON.parse(localStorage.getItem("sr_priorityOptions")) || [...defaultPriorities];
let tasks = JSON.parse(localStorage.getItem("sr_tasks")) || defaultTasks.map(t => ({...t}));
let archivedTasks = JSON.parse(localStorage.getItem("sr_archived_tasks")) || defaultArchivedTasks.map(t => ({...t}));
let showingArchive = false;

let currentView = "all";
let sortCol = "dueDate";
let sortAsc = true;
let searchTerm = "";
let filters = { taskType: "", status: "", priority: "" };
let editingTaskId = null;

/* ===== SAVE ===== */
function saveAll() {
  localStorage.setItem("sr_tasks", JSON.stringify(tasks));
  localStorage.setItem("sr_archived_tasks", JSON.stringify(archivedTasks));
  localStorage.setItem("sr_taskTypeOptions", JSON.stringify(taskTypeOptions));
  localStorage.setItem("sr_statusOptions", JSON.stringify(statusOptions));
  localStorage.setItem("sr_priorityOptions", JSON.stringify(priorityOptions));
}
function save() { saveAll(); }
function updateArchiveCount() {
  document.getElementById("archiveCount").textContent = archivedTasks.length;
}
save();

/* ===== TAG COLORS ===== */
const tagColors = [
  {bg:"#2d2040",fg:"#c4a5e0"},{bg:"#1e3a2f",fg:"#68d391"},{bg:"#3d3520",fg:"#ecc94b"},
  {bg:"#2a2040",fg:"#a0aee0"},{bg:"#3d2530",fg:"#f687b3"},{bg:"#1e3040",fg:"#63b3ed"},
  {bg:"#3a2d20",fg:"#f6ad55"},{bg:"#203535",fg:"#4fd1c5"},{bg:"#352030",fg:"#d6bcfa"},
  {bg:"#2d3520",fg:"#9ae6b4"},{bg:"#35202d",fg:"#fc8181"},{bg:"#203040",fg:"#90cdf4"}
];
function tagColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  return tagColors[Math.abs(h) % tagColors.length];
}

function statusDotColor(s) {
  const map = {"In progress":"#63b3ed","Not started":"#999","Proposal Out":"#F68E21","PAD Out":"#c4a5e0","Proposal Signed":"#68d391","Done":"#48bb78","Dead Deal":"#fc8181"};
  return map[s] || "#999";
}

document.getElementById("headerDate").textContent = new Date().toLocaleDateString("en-US", {weekday:"long",year:"numeric",month:"long",day:"numeric"});

/* ===== POPULATE FILTERS ===== */
function populateFilterDropdowns() {
  populateSelect("filterTaskType", taskTypeOptions, "All Task Types");
  populateSelect("filterStatus", statusOptions, "All Statuses");
  populateSelect("filterPriority", priorityOptions, "All Priorities");
}
function populateSelect(id, opts, allLabel) {
  const sel = document.getElementById(id);
  const val = sel.value;
  sel.innerHTML = '<option value="">' + allLabel + '</option>' + opts.map(function(o) { return '<option value="' + escH(o) + '">' + escH(o) + '</option>'; }).join("");
  sel.value = val;
}
function escH(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

populateFilterDropdowns();

/* ===== RENDER TABLE ===== */
function getFilteredSorted() {
  var list = tasks.slice();
  if (searchTerm) {
    var q = searchTerm.toLowerCase();
    list = list.filter(function(t) {
      return (t.client + " " + t.taskType.join(" ") + " " + t.status + " " + t.priority + " " + t.desc).toLowerCase().indexOf(q) >= 0;
    });
  }
  if (filters.taskType) list = list.filter(function(t) { return t.taskType.indexOf(filters.taskType) >= 0; });
  if (filters.status) list = list.filter(function(t) { return t.status === filters.status; });
  if (filters.priority) list = list.filter(function(t) { return t.priority === filters.priority; });
  if (currentView === "myTasks") list = list.filter(function(t) { return t.priority === "Medium" || t.priority === "High"; });
  var col = sortCol;
  list.sort(function(a, b) {
    var va = a[col], vb = b[col];
    if (Array.isArray(va)) va = va.join(", ");
    if (Array.isArray(vb)) vb = vb.join(", ");
    if (va === "" && vb !== "") return 1;
    if (vb === "" && va !== "") return -1;
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });
  if (currentView === "byStatus") {
    list.sort(function(a, b) {
      if (a.status < b.status) return -1;
      if (a.status > b.status) return 1;
      return 0;
    });
  }
  return list;
}

function render() {
  var list = getFilteredSorted();
  var tbody = document.getElementById("taskBody");
  var html = "";
  for (var i = 0; i < list.length; i++) {
    var t = list[i];
    var dateParts = t.dueDate.indexOf("T") >= 0 ? t.dueDate.split("T") : [t.dueDate, ""];
    var dateVal = dateParts[0];
    var timeVal = dateParts[1] || "";
    var priClass = t.priority ? "priority-" + t.priority : "";

    html += '<tr data-id="' + t.id + '">';
    html += '<td contenteditable="true" data-field="client" style="font-weight:700">' + escH(t.client) + '</td>';
    html += '<td><div class="tag-cell">';
    for (var j = 0; j < t.taskType.length; j++) {
      var tag = t.taskType[j];
      var c = tagColor(tag);
      html += '<span class="tag-pill" style="background:' + c.bg + ';color:' + c.fg + '" data-tag="' + escH(tag) + '">' + escH(tag) + '<span class="tag-x">&times;</span></span>';
    }
    html += '<button class="tag-add-btn" data-id="' + t.id + '">&#9660;</button></div></td>';

    html += '<td><select data-field="status">';
    for (var j = 0; j < statusOptions.length; j++) {
      var o = statusOptions[j];
      html += '<option' + (o === t.status ? ' selected' : '') + '>' + escH(o) + '</option>';
    }
    html += '</select></td>';

    html += '<td><select class="' + priClass + '" data-field="priority"><option value="">&mdash;</option>';
    for (var j = 0; j < priorityOptions.length; j++) {
      var o = priorityOptions[j];
      html += '<option' + (o === t.priority ? ' selected' : '') + ' value="' + escH(o) + '">' + escH(o) + '</option>';
    }
    html += '</select></td>';

    html += '<td style="white-space:nowrap"><input type="date" value="' + dateVal + '" data-field="dueDateDate"><input type="time" value="' + timeVal + '" data-field="dueDateTime"></td>';
    html += '<td class="desc-cell" contenteditable="true" data-field="desc">' + escH(t.desc) + '</td>';
    html += '<td class="actions-cell"><button class="delete-btn" data-id="' + t.id + '">&times;</button></td>';
    html += '</tr>';
  }
  tbody.innerHTML = html;
  document.getElementById("rowCount").textContent = list.length + " task" + (list.length !== 1 ? "s" : "");
}

/* ===== TABLE EVENT DELEGATION ===== */
document.getElementById("taskBody").addEventListener("input", function(e) {
  var tr = e.target.closest("tr");
  if (!tr) return;
  var id = tr.dataset.id;
  var task = tasks.find(function(t) { return t.id === id; });
  if (!task) return;
  var field = e.target.dataset.field;
  if (!field) return;
  if (field === "client" || field === "desc") {
    task[field] = e.target.textContent;
  } else if (field === "status") {
    task[field] = e.target.value;
  } else if (field === "priority") {
    task[field] = e.target.value;
    e.target.className = e.target.value ? "priority-" + e.target.value : "";
  }
  save();
});

document.getElementById("taskBody").addEventListener("change", function(e) {
  var tr = e.target.closest("tr");
  if (!tr) return;
  var id = tr.dataset.id;
  var task = tasks.find(function(t) { return t.id === id; });
  if (!task) return;
  var field = e.target.dataset.field;
  if (!field) return;
  if (field === "status") {
    task[field] = e.target.value;
  } else if (field === "priority") {
    task[field] = e.target.value;
    e.target.className = e.target.value ? "priority-" + e.target.value : "";
  } else if (field === "dueDateDate" || field === "dueDateTime") {
    var dateInput = tr.querySelector('[data-field="dueDateDate"]');
    var timeInput = tr.querySelector('[data-field="dueDateTime"]');
    task.dueDate = dateInput.value + (timeInput.value ? "T" + timeInput.value : "");
    save();
    render();
    return;
  }
  if (task.status === "Done" || task.status === "Dead Deal") {
    tasks = tasks.filter(function(t) { return t.id !== id; });
    archivedTasks.push(task);
    saveAll();
    render();
    updateArchiveCount();
    return;
  }
  save();
});

/* ===== DELETE & TAG CLICK ===== */
document.getElementById("taskBody").addEventListener("click", function(e) {
  // Toggle description expand/collapse
  if (e.target.classList.contains("desc-cell")) {
    e.target.classList.toggle("expanded");
    return;
  }
  if (e.target.classList.contains("delete-btn")) {
    var id = e.target.dataset.id;
    tasks = tasks.filter(function(t) { return t.id !== id; });
    save();
    render();
  }
  if (e.target.classList.contains("tag-x")) {
    var pill = e.target.closest(".tag-pill");
    var tr = e.target.closest("tr");
    var id = tr.dataset.id;
    var task = tasks.find(function(t) { return t.id === id; });
    if (task && pill) {
      var tagName = pill.dataset.tag;
      task.taskType = task.taskType.filter(function(t) { return t !== tagName; });
      save();
      render();
    }
  }
  if (e.target.classList.contains("tag-add-btn")) {
    openTagPicker(e.target.dataset.id, e.target);
  }
});

/* ===== TAG PICKER ===== */
var tagPickerEl = document.getElementById("tagPicker");
var tagPickerTaskId = null;

function openTagPicker(taskId, anchor) {
  tagPickerTaskId = taskId;
  var task = tasks.find(function(t) { return t.id === taskId; });
  if (!task) return;
  var rect = anchor.getBoundingClientRect();
  tagPickerEl.style.left = rect.left + "px";
  tagPickerEl.style.top = (rect.bottom + 4) + "px";
  tagPickerEl.style.display = "block";
  renderTagPicker(task);
}

function renderTagPicker(task) {
  var html = "";
  for (var i = 0; i < taskTypeOptions.length; i++) {
    var opt = taskTypeOptions[i];
    var checked = task.taskType.indexOf(opt) >= 0;
    html += '<div class="tag-picker-item" data-opt="' + escH(opt) + '"><span class="check">' + (checked ? "&#10003;" : "") + '</span><span>' + escH(opt) + '</span></div>';
  }
  tagPickerEl.innerHTML = html;
}

tagPickerEl.addEventListener("click", function(e) {
  var item = e.target.closest(".tag-picker-item");
  if (!item) return;
  var opt = item.dataset.opt;
  var task = tasks.find(function(t) { return t.id === tagPickerTaskId; });
  if (!task) return;
  var idx = task.taskType.indexOf(opt);
  if (idx >= 0) { task.taskType.splice(idx, 1); } else { task.taskType.push(opt); }
  save();
  renderTagPicker(task);
  render();
});

document.addEventListener("click", function(e) {
  if (!tagPickerEl.contains(e.target) && !e.target.classList.contains("tag-add-btn")) {
    tagPickerEl.style.display = "none";
    tagPickerTaskId = null;
  }
});

function openTaskModal(task) {
  editingTaskId = task ? task.id : null;
  document.getElementById("taskModalTitle").textContent = task ? "Edit Task" : "New Task";
  document.getElementById("mClient").value = task ? task.client : "";
  var ms = document.getElementById("mStatus");
  ms.innerHTML = statusOptions.map(function(o) { return '<option>' + escH(o) + '</option>'; }).join("");
  if (task) ms.value = task.status;
  var mp = document.getElementById("mPriority");
  mp.innerHTML = '<option value="">&mdash;</option>' + priorityOptions.map(function(o) { return '<option>' + escH(o) + '</option>'; }).join("");
  if (task) mp.value = task.priority;
  var dp = task && task.dueDate ? task.dueDate.split("T") : ["",""];
  document.getElementById("mDueDate").value = dp[0] || "";
  document.getElementById("mDueTime").value = dp[1] || "";
  document.getElementById("mDesc").value = task ? task.desc : "";
  var selectedTags = task ? task.taskType.slice() : [];
  var area = document.getElementById("mTaskType");
  function renderModalTags() {
    var h = "";
    for (var i = 0; i < taskTypeOptions.length; i++) {
      var o = taskTypeOptions[i];
      var sel = selectedTags.indexOf(o) >= 0;
      var c = tagColor(o);
      h += '<span class="tag-opt' + (sel ? ' selected' : '') + '" style="background:' + (sel ? c.bg : '#333') + ';color:' + (sel ? c.fg : '#999') + '" data-tag="' + escH(o) + '">' + escH(o) + '</span>';
    }
    area.innerHTML = h;
  }
  renderModalTags();
  area.onclick = function(e) {
    var tg = e.target.closest(".tag-opt");
    if (!tg) return;
    var name = tg.dataset.tag;
    var idx = selectedTags.indexOf(name);
    if (idx >= 0) selectedTags.splice(idx, 1); else selectedTags.push(name);
    renderModalTags();
  };
  document.getElementById("taskModal").classList.add("open");
  document.getElementById("taskModal")._selectedTags = selectedTags;
}

document.getElementById("newTaskBtn").addEventListener("click", function() { openTaskModal(null); });
document.getElementById("taskModalCancel").addEventListener("click", function() {
  document.getElementById("taskModal").classList.remove("open");
});
document.getElementById("taskModalSave").addEventListener("click", function() {
  var selectedTags = document.getElementById("taskModal")._selectedTags || [];
  var dateVal = document.getElementById("mDueDate").value;
  var timeVal = document.getElementById("mDueTime").value;
  var dueDate = dateVal + (timeVal ? "T" + timeVal : "");
  var data = {
    client: document.getElementById("mClient").value,
    taskType: selectedTags,
    status: document.getElementById("mStatus").value,
    priority: document.getElementById("mPriority").value,
    dueDate: dueDate,
    desc: document.getElementById("mDesc").value
  };
  if (editingTaskId) {
    var task = tasks.find(function(t) { return t.id === editingTaskId; });
    if (task) Object.assign(task, data);
  } else {
    data.id = String(Date.now());
    tasks.push(data);
  }
  if (data.status === "Done" || data.status === "Dead Deal") {
    var archiveId = editingTaskId || data.id;
    var archTask = tasks.find(function(t) { return t.id === archiveId; });
    if (archTask) {
      tasks = tasks.filter(function(t) { return t.id !== archiveId; });
      archivedTasks.push(archTask);
    }
  }
  saveAll();
  render();
  updateArchiveCount();
  document.getElementById("taskModal").classList.remove("open");
});

  document.getElementById("ddModal").classList.remove("open");
});
document.getElementById("ddSelect").addEventListener("change", renderDDList);

function getOptionsList(key) {
  if (key === "taskType") return taskTypeOptions;
  if (key === "status") return statusOptions;
  if (key === "priority") return priorityOptions;
  return [];
}
function setOptionsList(key, arr) {
  if (key === "taskType") taskTypeOptions = arr;
  else if (key === "status") statusOptions = arr;
  else if (key === "priority") priorityOptions = arr;
}

function renderDDList() {
  var key = document.getElementById("ddSelect").value;
  var opts = getOptionsList(key);
  var html = "";
  for (var i = 0; i < opts.length; i++) {
    html += '<li><input value="' + escH(opts[i]) + '" data-idx="' + i + '"><button class="btn btn-sm btn-danger dd-del" data-idx="' + i + '">&times;</button></li>';
  }
  document.getElementById("ddList").innerHTML = html;
}

document.getElementById("ddList").addEventListener("click", function(e) {
  if (e.target.classList.contains("dd-del")) {
    var key = document.getElementById("ddSelect").value;
    var opts = getOptionsList(key);
    opts.splice(Number(e.target.dataset.idx), 1);
    setOptionsList(key, opts);
    renderDDList();
  }
});

document.getElementById("ddAdd").addEventListener("click", function() {
  var key = document.getElementById("ddSelect").value;
  var opts = getOptionsList(key);
  opts.push("New Item");
  setOptionsList(key, opts);
  renderDDList();
});

document.getElementById("ddSave").addEventListener("click", function() {
  var key = document.getElementById("ddSelect").value;
  var inputs = document.querySelectorAll("#ddList input");
  var arr = [];
  inputs.forEach(function(inp) { if (inp.value.trim()) arr.push(inp.value.trim()); });
  setOptionsList(key, arr);
  save();
  populateFilterDropdowns();
  render();
  renderDDList();
});

/* ===== EXPORT / IMPORT / CLEAR ===== */
document.getElementById("exportBtn").addEventListener("click", function() {
  var blob = new Blob([JSON.stringify(tasks, null, 2)], {type: "application/json"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "tja-status-report.json";
  a.click();
});

document.getElementById("importBtn").addEventListener("click", function() {
  document.getElementById("importInput").click();
});
document.getElementById("importInput").addEventListener("change", function() {
  var file = this.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (Array.isArray(data)) { tasks = data; save(); render(); }
    } catch(err) { alert("Invalid JSON file"); }
  };
  reader.readAsText(file);
  this.value = "";
});

document.getElementById("clearBtn").addEventListener("click", function() {
  if (confirm("Clear all tasks? This cannot be undone.")) {
    tasks = [];
    save();
    render();
  }
});

/* ===== ARCHIVE (now accessed via view tab) ===== */

function renderArchive() {
  var tbody = document.getElementById("taskBody");
  var html = "";
  for (var i = 0; i < archivedTasks.length; i++) {
    var t = archivedTasks[i];
    var dateParts = t.dueDate.indexOf("T") >= 0 ? t.dueDate.split("T") : [t.dueDate, ""];
    var dateVal = dateParts[0];
    var timeVal = dateParts[1] || "";
    var dotColor = statusDotColor(t.status);
    html += '<tr data-id="' + t.id + '">';
    html += '<td style="font-weight:700">' + escH(t.client) + '</td>';
    html += '<td><div class="tag-cell">';
    for (var j = 0; j < t.taskType.length; j++) {
      var tag = t.taskType[j];
      var c = tagColor(tag);
      html += '<span class="tag-pill" style="background:' + c.bg + ';color:' + c.fg + '">' + escH(tag) + '</span>';
    }
    html += '</div></td>';
    html += '<td><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:' + dotColor + ';margin-right:4px;"></span>' + escH(t.status) + '</td>';
    html += '<td>' + escH(t.priority) + '</td>';
    html += '<td style="white-space:nowrap">' + escH(dateVal) + (timeVal ? ' ' + escH(timeVal) : '') + '</td>';
    html += '<td class="desc-cell">' + escH(t.desc) + '</td>';
    html += '<td class="actions-cell"><button class="btn btn-sm restore-btn" data-id="' + t.id + '">Restore</button></td>';
    html += '</tr>';
  }
  tbody.innerHTML = html;
  document.getElementById("rowCount").textContent = archivedTasks.length + " archived task" + (archivedTasks.length !== 1 ? "s" : "");
}

document.getElementById("taskBody").addEventListener("click", function(e) {
  if (e.target.classList.contains("restore-btn")) {
    var id = e.target.dataset.id;
    var idx = -1;
    for (var i = 0; i < archivedTasks.length; i++) {
      if (archivedTasks[i].id === id) { idx = i; break; }
    }
    if (idx >= 0) {
      var task = archivedTasks.splice(idx, 1)[0];
      task.status = "In progress";
      tasks.push(task);
      saveAll();
      updateArchiveCount();
      if (currentView === "completed") renderArchive();
      else render();
    }
  }
});

/* ===== INIT ===== */
render();
updateArchiveCount();
</script>
</body>
